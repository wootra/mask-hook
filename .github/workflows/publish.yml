name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Test and publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Read package metadata
        id: package
        run: |
          node scripts/write-package-metadata-output.mjs

      - name: Verify tag matches package version
        run: |
          if [ "$GITHUB_REF_NAME" != "v${{ steps.package.outputs.version }}" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version v${{ steps.package.outputs.version }}"
            exit 1
          fi

      - name: Fail if version already exists on npm
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} already exists on npm"
            exit 1
          fi

      - name: Type check
        run: npm run typecheck --workspace=packages/mask-hook

      - name: Run tests
        run: npm test --workspace=packages/mask-hook

      - name: Publish to npm
        run: npm publish --workspace=packages/mask-hook --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
